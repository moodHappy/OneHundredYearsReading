<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Macondo Matrix 枢纽</title>
    <style>
        :root { --bg: #f5f5f7; --primary: #2980b9; --accent: #f1c40f; --card: #ffffff; --border: #e0e0e0; --text: #333; }
        body, html { font-family: -apple-system, "Segoe UI", sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text); height: 100%; overflow: hidden; }
        
        .viewport { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; height: 100vh; -webkit-overflow-scrolling: touch; }
        .viewport::-webkit-scrollbar { display: none; }
        .page { flex: 0 0 100vw; width: 100vw; height: 100vh; scroll-snap-align: start; overflow-y: auto; padding-bottom: 30px; box-sizing: border-box; }
        
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        
        /* 完美还原截图的顶部顶格搜索栏 */
        .search-bar-wrapper { display: flex; align-items: center; gap: 12px; margin-top: 5px; margin-bottom: 20px; }
        .search-input { flex-grow: 1; padding: 12px 18px; border: 1px solid var(--border); border-radius: 25px; outline: none; font-size: 0.95rem; background: var(--card); box-shadow: inset 0 1px 3px rgba(0,0,0,0.02); transition: border-color 0.2s; }
        .search-input:focus { border-color: var(--primary); }
        .settings-btn-top { background: none; border: none; font-size: 1.4rem; cursor: pointer; opacity: 0.8; padding: 0; display: flex; align-items: center; }
        
        .controls { display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 20px; }
        .select-box { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; outline: none; font-weight: bold; background: var(--card); color: var(--primary); -webkit-appearance: none; appearance: none; text-align: center; }
        .nav-btn, .today-btn { background: #e74c3c; color: white; border: none; border-radius: 8px; padding: 8px 14px; font-weight: bold; font-size: 0.95rem; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: transform 0.2s, background 0.2s;}
        .nav-btn:active, .today-btn:active { transform: scale(0.95); background: #c0392b; }
        .today-btn { padding: 8px 18px; }

        .calendar-wrapper { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.01); margin-bottom: 20px; }
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 13px; color: #888; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day-cell { aspect-ratio: 1; display: flex; justify-content: center; align-items: center; font-weight: bold; border-radius: 10px; position: relative; cursor: pointer; transition: all 0.2s; }
        .day-cell.empty { visibility: hidden; }
        .day-cell.has-news { color: var(--text); background: #fdfdfd; border: 1px solid #f5f5f5; }
        .day-cell.no-news { color: #dcdde1; }
        .day-cell.selected { border: 1px solid #e74c3c; background: #fdedec; color: #e74c3c; }
        .day-cell.today { background: #fff9e6; border: 1px solid #f1c40f; }
        .dot { width: 4px; height: 4px; background: #e74c3c; border-radius: 50%; position: absolute; bottom: 6px; display: none; }
        .day-cell.has-news .dot { display: block; }
        
        /* 极致紧凑一行流行表 */
        .feed-list { display: flex; flex-direction: column; gap: 12px; }
        .feed-item { background: var(--card); padding: 16px 18px; border-radius: 12px; text-decoration: none; color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.02); display: flex; flex-direction: row; align-items: center; gap: 15px; transition: transform 0.2s; border: 1px solid transparent; }
        .feed-item:active { transform: scale(0.98); background: #fafafa; }
        .feed-time { font-family: -apple-system, sans-serif; font-weight: 800; color: #111; font-size: 0.95rem; flex-shrink: 0; min-width: 45px; text-align: center; }
        .feed-title { color: #7f8c8d; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-grow: 1; }
        
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; color: var(--primary); font-size: 0.95rem; }
        .form-control { width: 100%; box-sizing: border-box; padding: 15px; border: 1px solid var(--border); border-radius: 10px; font-size: 1rem; font-family: inherit; resize: vertical; background: var(--card); }
        .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(41,128,185,0.1); }
        textarea.form-control { min-height: 120px; line-height: 1.5; }
        .btn-push { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 10px; font-size: 1.15rem; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 15px rgba(41,128,185,0.3); transition: background 0.2s; }
        .btn-push:active { transform: scale(0.98); background: #2471a3; }
        .btn-push:disabled { background: #95a5a6; cursor: not-allowed; box-shadow: none; }
        
        .modal { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(4px); }
        .modal-content { background: #fff; padding: 25px; border-radius: 16px; width: 100%; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .modal-content input { width: 100%; padding: 12px; margin-bottom: 15px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; }
        .modal-content button { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; }
        
        .page-indicator { text-align: center; color: #95a5a6; font-size: 0.85rem; padding: 15px; letter-spacing: 1px; }
    </style>
</head>
<body>

        <div class="page" id="page-2">

                    <h1 style="margin: 0; font-size: 1.8rem; color: var(--primary);">Deconstruct</h1>
                    <p style="margin: 5px 0 0 0; font-size: 0.9rem; color: #7f8c8d;">目标仓库: OneHundredYearsReading</p>
                </div>
                <div class="form-group">

                    <textarea id="in-analysis" class="form-control" style="min-height: 280px;" placeholder="支持 Markdown 语法..."></textarea>
                </div>
                <button class="btn-push" id="pushBtn" onclick="pushToGitHub()">🚀 推送至云端矩阵</button>
                <div class="page-indicator" style="margin-top: 20px;">向右滑动返回日历枢纽 →</div>
            </div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 style="margin-top:0; color:#2c3e50;">配置核心 Token</h3>
            <p style="font-size:0.8rem; color:#888; margin-top:-10px;">仅需 Token，目标仓库已自动焊死！</p>
            <input type="password" id="gh-token" placeholder="输入你的 GitHub Token">

    <script>
        const GH_OWNER = "moodHappy";
        const GH_REPO = "OneHundredYearsReading";

        window.onload = function() {
            if (!localStorage.getItem('GH_TOKEN')) {
                document.getElementById('modal').style.display = 'flex';
            }
        };

        const archiveData = {"2026": {"6": {"30": [{"time": "11:00", "path": "2026/06/2026_06_30_1100.html", "title": "By then Melqu\u00edades had ag...", "original": "By then Melqu\u00edades had aged with surprising rapidity.\n\nOn his first trips he seemed to be the same age as Jos\u00e9 Arcadio Buend\u00eda.\n\nBut while the latter had preserved his extraordinary strength, which permitted him to pull down a horse by grabbing its ears, the gypsy seemed to have been worn dowse by some tenacious illness.\n\nIt was, in reality, the result of multiple and rare diseases contracted on his innumerable trips around the world."}, {"time": "10:59", "path": "2026/06/2026_06_30_1059.html", "title": "The whole village was con...", "original": "The whole village was convinced that Jos\u00e9 Arcadio Buend\u00eda had lost his reason, when Melqu\u00edades returned to set things straight.\n\nHe gave public praise to the intelligence of a man who from pure astronomical speculation had evolved a theory that had already been proved in practice, although unknown in Macondo until then, and as a proof of his admiration he made him a gift that was to have a profound influence on the future of the village: the laboratory of an alchemist."}, {"time": "10:08", "path": "2026/06/2026_06_30_1008.html", "title": "Jos\u00e9 Arcadio Buend\u00eda, imp...", "original": "Jos\u00e9 Arcadio Buend\u00eda, impassive, did not let himself be frightened by the desperation of his wife, who, in a seizure of rage, mashed the astrolabe against the floor.\n\nHe built another one, he gathered the men of the village in his little room, and he demonstrated to them, with theories that none of them could understand, the possibility of returning to where one had set out by consistently sailing east."}], "29": [{"time": "22:46", "path": "2026/06/2026_06_29_2246.html", "title": "The children would rememb...", "original": "The children would remember for the rest of their lives the august solemnity with which their father, devastated by his prolonged vigil and by the wrath of his imagination, revealed his discovery to them:\n\n&quot;The earth is round, like an orange.&quot;\n\n\u00farsula lost her patience.\n\n&quot;If you have to go crazy, please go crazy all by yourself!&quot; she shouted.\n\n&quot;But don&#039;t try to put your gypsy ideas into the heads of the children.&quot;"}, {"time": "22:11", "path": "2026/06/2026_06_29_2211.html", "title": "Suddenly, without warning...", "original": "Suddenly, without warning, his feverish activity was interrupted and was replaced by a kind of fascination.\n\nHe spent several days as if he were bewitched, softly repeating to himself a string of fearful conjectures without giving credit to his own understanding.\n\nFinally, one Tuesday in December, at lunchtime, all at once he released the whole weight of his torment."}, {"time": "21:32", "path": "2026/06/2026_06_29_2132.html", "title": "When he became an expert ...", "original": "When he became an expert in the use and manipulation of his instruments, he conceived a notion of space that allowed him to navigate across unknown seas, to visit uninhabited territories, and to establish relations with splendid beings without having to leave his study.\n\nThat was the period in which he acquired the habit of talking to himself, of walking through the house without paying attention to anyone, as \u00farsula and the children broke their backs in the garden, growing banana and caladium, cassava and yams, ahuyama roots and eggplants."}, {"time": "20:47", "path": "2026/06/2026_06_29_2047.html", "title": "Jos\u00e9 Arcadio Buend\u00eda spen...", "original": "Jos\u00e9 Arcadio Buend\u00eda spent the long months of the rainy season shut up in a small room that he had built in the rear the house so that no one would disturb his experiments.\n\nHaving completely abandoned his domestic obligations, he spent entire nights in the courtyard watching the course of the stars and he almost contracted sunstroke from trying to establish an exact method to ascertain noon."}, {"time": "18:40", "path": "2026/06/2026_06_29_1840.html", "title": "Finally, tired of waiting...", "original": "Finally, tired of waiting, he bemoaned to Melqu\u00edades the failure of his project and the gypsy then gave him a convincing proof of his honesty: he gave him back the doubloons in exchange for the magnifying glass, and he left him in addition some Portuguese maps and several instruments of navigation.\n\nIn his own handwriting he set down a concise synthesis of the studies by Monk Hermann.\n\nwhich he left Jos\u00e9 Arcadio so that he would be able to make use of the astrolabe, the compass, and the sextant."}, {"time": "18:30", "path": "2026/06/2026_06_29_1830.html", "title": "In spite of the fact that...", "original": "In spite of the fact that a trip to the capital was little less than impossible at that time, Jos\u00e9 Arcadio Buend\u00eda promised to undertake it as soon as the government ordered him to so that he could put on some practical demonstrations of his invention for the military authorities and could train them himself in the complicated art of solar war.\n\nFor several years he waited for an answer."}, {"time": "17:20", "path": "2026/06/2026_06_29_1720.html", "title": "He sent it to the governm...", "original": "He sent it to the government, accompanied by numerous descriptions of his experiments and several pages of explanatory sketches; by a messenger who crossed the mountains, got lost in measureless swamps, forded stormy rivers, and was on the point of perishing under the lash of despair, plague, and wild beasts until he found a route that joined the one used by the mules that carried the mail."}, {"time": "16:26", "path": "2026/06/2026_06_29_1626.html", "title": "Over the protests of his ...", "original": "Over the protests of his wife, who was alarmed at such a dangerous invention, at one point he was ready to set the house on fire.\n\nHe would spend hours on end in his room, calculating the strategic possibilities of his novel weapon until he succeeded in putting together a manual of startling instructional clarity and an irresistible power of conviction."}, {"time": "13:37", "path": "2026/06/2026_06_29_1337.html", "title": "Jos\u00e9 Arcadio Buend\u00eda made...", "original": "Jos\u00e9 Arcadio Buend\u00eda made no at tempt to console her, completely absorbed in his tactical experiments with the abnegation of a scientist and even at the risk of his own life.\n\nIn an attempt to show the effects of the glass on enemy troops, he exposed himself to the concentration of the sun&#039;s rays and suffered burns which turned into sores that took a long time to heal"}, {"time": "13:27", "path": "2026/06/2026_06_29_1327.html", "title": "Again Melqu\u00edades tried to...", "original": "Again Melqu\u00edades tried to dissuade him, but he finally accepted the two magnetized ingots and three colonial coins in exchange for the magnifying glass.\n\n\u00farsula wept in consternation.\n\nThat money was from a chest of gold coins that her father had put together ova an entire life of privation and that she had buried underneath her bed in hopes of a proper occasion to make use of it."}, {"time": "13:14", "path": "2026/06/2026_06_29_1314.html", "title": "A burning noonday sun bro...", "original": "A burning noonday sun brought out a startling demonstration with the gigantic magnifying glass: they put a pile of dry hay in the middle of the street and set it on fire by concentrating the sun&#039;s rays.\n\nJos\u00e9 Arcadio Buend\u00eda, who had still not been consoled for the failure of big magnets, conceived the idea of using that invention as a weapon of war."}, {"time": "12:36", "path": "2026/06/2026_06_29_1236.html", "title": "In March the gypsies retu...", "original": "In March the gypsies returned.\n\nThis time they brought a telescope and a magnifying glass the size of a drum, which they exhibited as the latest discovery of the Jews of Amsterdam.\n\nThey placed a gypsy woman at one end of the village and set up the telescope at the entrance to the tent.\n\nFor the price of five reales, people could look into the telescope see the gypsy woman an arm&#039;s length away.\n\n&quot;Science has eliminated distance,&quot; Melqu\u00edades proclaimed.\n\n&quot;In a short time, man will be able to see what is happening in any place in the world without leaving his own house.&quot;"}, {"time": "12:05", "path": "2026/06/2026_06_29_1205.html", "title": "The only thing he succeed...", "original": "The only thing he succeeded in doing was to unearth a suit fifteenth-century armor which had all of its pieces soldered together with rust and inside of which there was the hollow resonance of an enormous stone-filled gourd.\n\nWhen Jos\u00e9 Arcadio Buend\u00eda and the four men of his expedition managed to take the armor apart, they found inside a calcified skeleton with a copper locket containing a woman&#039;s hair around its neck."}, {"time": "11:30", "path": "2026/06/2026_06_29_1130.html", "title": "But Jos\u00e9 Arcadio Buend\u00eda ...", "original": "But Jos\u00e9 Arcadio Buend\u00eda at that time did not believe in the honesty of gypsies, so he traded his mule and a pair of goats for the two magnetized ingots.\n\n\u00farsula Iguar\u00e1n, his wife, who relied on those animals to increase their poor domestic holdings, was unable to dissuade him.\n\n&quot;Very soon well have gold enough and more to pave the floors of the house,&quot; her husband replied.\n\nFor several months he worked hard to demonstrate the truth of his idea.\n\nHe explored every inch of the region, even the riverbed, dragging the two iron ingots along and reciting Melqu\u00edades&#039; incantation aloud."}, {"time": "07:51", "path": "2026/06/2026_06_29_0751.html", "title": "\"Things have a life of th...", "original": "&quot;Things have a life of their own,&quot; the gypsy proclaimed with a harsh accent.\n\n&quot;It&#039;s simply a matter of waking up their souls.&quot;\n\nJos\u00e9 Arcadio Buend\u00eda, whose unbridled imagination always went beyond the genius of nature and even beyond miracles and magic, thought that it would be possible to make use of that useless invention to extract gold from the bowels of the earth.\n\nMelqu\u00edades, who was an honest man, warned him: &quot;It won&#039;t work for that.&quot;"}, {"time": "07:35", "path": "2026/06/2026_06_29_0735.html", "title": "He went from house to hou...", "original": "He went from house to house dragging two metal ingots and everybody was amazed to see pots, pans, tongs, and braziers tumble down from their places and beams creak from the desperation of nails and screws trying to emerge, and even objects that had been lost for a long time appeared from where they had been searched for most and went dragging along in turbulent confusion behind Melqu\u00edades&#039; magical irons."}, {"time": "07:34", "path": "2026/06/2026_06_29_0734.html", "title": "A heavy gypsy with an unt...", "original": "A heavy gypsy with an untamed beard and sparrow hands, who introduced himself as Melqu\u00edades, put on a bold public demonstration he himself called the eighth wonder of the learned alchemists of Macedonia."}, {"time": "07:28", "path": "2026/06/2026_06_29_0728.html", "title": "The world was so recent t...", "original": "The world was so recent that many things lacked names, and in order to indicate them it was necessary to point.\n\nEvery year during the month of March a family of ragged gypsies would set up their tents near the village, and with a great uproar of pipes and kettledrums they would display new inventions.\n\nFirst they brought the magnet."}, {"time": "00:17", "path": "2026/06/2026_06_29_0017.html", "title": "At that time Macondo was ...", "original": "At that time Macondo was a village of twenty adobe houses, built on the bank of a river of clear water that ran along a bed of polished stones, which were white and enormous, like prehistoric eggs."}], "28": [{"time": "23:11", "path": "2026/06/2026_06_28_2311.html", "title": "MANY YEARS LATER as he fa...", "original": "MANY YEARS LATER as he faced the firing squad, Colonel Aureliano Buend\u00eda was to remember that distant afternoon when his father took him to discover ice."}]}, "7": {"2": [{"time": "10:34", "path": "2026/07/2026_07_02_1034.html", "title": "Aureliano, who could not ...", "original": "Aureliano, who could not have been more than five at the time, would remember him for the rest of his life as he saw him that afternoon, sitting against the metallic and quivering light from the window, lighting up with his deep organ voice the darkest reaches of the imagination, while down over his temples there flowed the grease that was being melted by the heat."}, {"time": "10:33", "path": "2026/07/2026_07_02_1033.html", "title": "On that suffocating noont...", "original": "On that suffocating noontime when the gypsy revealed his secrets, Jos\u00e9 Arcadio Buend\u00eda had the certainty that it was the beginning of a great friendship.\n\nThe children were startled by his fantastic stories."}], "1": [{"time": "21:20", "path": "2026/07/2026_07_01_2120.html", "title": "He would complain of the ...", "original": "He would complain of the ailments of old age, he suffered from the most insignificant economic difficulties, and he had stopped laughing a long time back because scurvy had made his teeth drop out."}, {"time": "21:19", "path": "2026/07/2026_07_01_2119.html", "title": "He wore a large black hat...", "original": "He wore a large black hat that looked like a raven with widespread wings, and a velvet vest across which the patina of the centuries had skated.\n\nBut in spite of his immense wisdom and his mysterious breadth, he had a human burden, an earthly condition that kept him involved in the small problems of daily life."}, {"time": "21:18", "path": "2026/07/2026_07_01_2118.html", "title": "That prodigious creature,...", "original": "That prodigious creature, said to possess the keys of Nostradamus, was a gloomy man, enveloped in a sad aura, with an Asiatic look that seemed to know what there was on the other side of things."}, {"time": "21:17", "path": "2026/07/2026_07_01_2117.html", "title": "He had survived pellagra ...", "original": "He had survived pellagra in Persia, scurvy in the Malayan archipelago, leprosy in Alexandria, beriberi in Japan, bubonic plague in Madagascar, an earthquake in Sicily, and a disastrous shipwreck in the Strait of Magellan."}, {"time": "21:16", "path": "2026/07/2026_07_01_2116.html", "title": "According to what he hims...", "original": "According to what he himself said as he spoke to Jos\u00e9 Arcadio Buend\u00eda while helping him set up the laboratory, death followed him everywhere, sniffing at the cuffs of his pants, but never deciding to give him the final clutch of its claws.\n\nHe was a fugitive from all the plagues and catastrophes that had ever lashed mankind."}]}}};
        const today = new Date();
        let sY = today.getFullYear(), sM = today.getMonth() + 1, sD = today.getDate();
        
        const yearSelect = document.getElementById('yearSelect');
        const monthSelect = document.getElementById('monthSelect');
        const daysGrid = document.getElementById('daysGrid');
        const searchInput = document.getElementById('searchInput');
        
        function initSelects() {
            const years = Object.keys(archiveData).map(Number).sort((a,b)=>b-a);
            if(!years.includes(sY)) years.unshift(sY);
            years.forEach(y => {
                const opt = document.createElement('option'); opt.value = y; opt.textContent = y + '年';
                yearSelect.appendChild(opt);
            });
            yearSelect.value = sY; monthSelect.value = sM;
        }
        
        function renderCalendar() {
            daysGrid.innerHTML = '';
            let firstDay = new Date(sY, sM - 1, 1).getDay();
            if (firstDay === 0) firstDay = 7;
            const daysInMonth = new Date(sY, sM, 0).getDate();
            
            for(let i=1; i<firstDay; i++) {
                daysGrid.innerHTML += '<div class="day-cell empty"></div>';
            }
            
            const monthData = (archiveData[sY] && archiveData[sY][sM]) || {};
            for(let d=1; d<=daysInMonth; d++) {
                const hasNews = monthData[d] && monthData[d].length > 0;
                const isToday = sY === today.getFullYear() && sM === today.getMonth()+1 && d === today.getDate();
                const isSelected = d === sD;
                
                let classes = 'day-cell';
                if(hasNews) classes += ' has-news'; else classes += ' no-news';
                if(isToday) classes += ' today';
                if(isSelected) classes += ' selected';
                
                const cell = document.createElement('div');
                cell.className = classes;
                cell.innerHTML = d + `<div class="dot" style="display:${hasNews?'block':'none'}"></div>`;
                cell.onclick = () => { sD = d; renderCalendar(); renderList(); };
                daysGrid.appendChild(cell);
            }
        }
        
        function renderList() {
            const list = document.getElementById('feedList');
            const data = (archiveData[sY] && archiveData[sY][sM] && archiveData[sY][sM][sD]) || [];
            
            if(data.length) {
                const itemsHtml = data.map(item => `<a href="${item.path}" class="feed-item"><span class="feed-time">${item.time}</span><span class="feed-title">${item.title}</span></a>`).join('');
                list.innerHTML = itemsHtml;
            } else {
                list.innerHTML = '<div style="text-align:center; padding: 25px 20px; color:#bdc3c7; font-size: 0.9rem;">当日无其他解构档案</div>';
            }
        }

        // ==========================================
        // 核心亮点：全静态库无缝搜索功能逻辑
        // ==========================================
        searchInput.oninput = function(e) {
            const query = e.target.value.trim().toLowerCase();
            const calWrapper = document.getElementById('calendarWrapper');
            const calControls = document.getElementById('calendarControls');
            const slideIndicator = document.getElementById('slideIndicator');
            const list = document.getElementById('feedList');
            
            if (query) {
                // 搜索激活状态：深度隐藏日历盘区和辅助滑动提示
                calWrapper.style.display = 'none';
                calControls.style.display = 'none';
                if(slideIndicator) slideIndicator.style.display = 'none';
                
                let resultsHtml = '';
                let matchCount = 0;
                
                // 全库横向全扫 JSON 树
                for (const y in archiveData) {
                    for (const m in archiveData[y]) {
                        for (const d in archiveData[y][m]) {
                            const items = archiveData[y][m][d];
                            items.forEach(item => {
                                const inOriginal = item.original && item.original.toLowerCase().includes(query);
                                const inTitle = item.title && item.title.toLowerCase().includes(query);
                                
                                if (inOriginal || inTitle) {
                                    matchCount++;
                                    const datePrefix = `${m.toString().padStart(2, '0')}-${d.toString().padStart(2, '0')}`;
                                    resultsHtml += `
                                        <a href="${item.path}" class="feed-item">
                                            <span class="feed-time" style="min-width: 55px; font-size: 0.85rem; color: #e74c3c; background: #fdedec; border-radius: 6px; padding: 2px 4px;">${datePrefix}</span>
                                            <span class="feed-title">${item.title}</span>
                                        </a>`;
                                }
                            });
                        }
                    }
                }
                
                if (matchCount > 0) {
                    list.innerHTML = resultsHtml;
                } else {
                    list.innerHTML = '<div style="text-align:center; padding: 35px 20px; color:#bdc3c7; font-size: 0.9rem;">🔍 未检索到匹配的解构档案</div>';
                }
            } else {
                // 搜索词清空：无缝还原日历主面板
                calWrapper.style.display = 'block';
                calControls.style.display = 'flex';
                if(slideIndicator) slideIndicator.style.display = 'block';
                renderCalendar();
                renderList();
            }
        };
        
        yearSelect.onchange = e => { sY = parseInt(e.target.value); renderCalendar(); renderList(); };
        monthSelect.onchange = e => { sM = parseInt(e.target.value); renderCalendar(); renderList(); };
        
        initSelects(); 
        renderCalendar(); 
        renderList();

        function ensureYearOption(y) {
            let found = false;
            for(let i=0; i<yearSelect.options.length; i++){
                if(parseInt(yearSelect.options[i].value) === y) { found = true; break; }
            }
            if(!found) {
                const opt = document.createElement('option'); opt.value = y; opt.textContent = y + '年';
                yearSelect.appendChild(opt);
                let opts = Array.from(yearSelect.options);
                opts.sort((a,b) => parseInt(b.value) - parseInt(a.value));
                yearSelect.innerHTML = '';
                opts.forEach(o => yearSelect.appendChild(o));
            }
        }

        function updateUI() {
            ensureYearOption(sY);
            yearSelect.value = sY;
            monthSelect.value = sM;
            renderCalendar();
            renderList();
        }

        document.getElementById('prevMonthBtn').onclick = () => { 
            sM--; 
            if (sM < 1) { sM = 12; sY--; } 
            updateUI(); 
        };
        
        document.getElementById('nextMonthBtn').onclick = () => { 
            sM++; 
            if (sM > 12) { sM = 1; sY++; } 
            updateUI(); 
        };
        
        document.getElementById('todayBtn').onclick = () => { 
            sY = today.getFullYear(); 
            sM = today.getMonth() + 1; 
            sD = today.getDate(); 
            updateUI(); 
        };

        function saveSettings() {
            localStorage.setItem('GH_TOKEN', document.getElementById('gh-token').value.trim());
            document.getElementById('modal').style.display = 'none';
        }

        function escapeHTML(str) {
            return str.replace(/&/g, '&amp;')
                      .replace(/</g, '&lt;')
                      .replace(/>/g, '&gt;')
                      .replace(/"/g, '&quot;')
                      .replace(/'/g, '&#039;');
        }

        async function pushToGitHub() {
            const token = localStorage.getItem('GH_TOKEN');
            if(!token) {
                document.getElementById('modal').style.display='flex';
                return;
            }
            
            const original = document.getElementById('in-original').value.trim();
            const analysis = document.getElementById('in-analysis').value.trim();
            
            if(!original || !analysis) return alert("原文和分析均不能为空！");
            
            let autoTitle = original.substring(0, 25).replace(/\n/g, ' ');
            if (original.length > 25) autoTitle += '...';
            
            const btn = document.getElementById('pushBtn');
            btn.innerText = "⏳ 跨海直推中..."; btn.disabled = true;
            
            const targetHtml = generateTemplate(autoTitle, original, analysis);
            
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth()+1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const h = String(now.getHours()).padStart(2, '0');
            const mn = String(now.getMinutes()).padStart(2, '0');
            
            const filePath = `docs/${y}/${m}/${y}_${m}_${d}_${h}${mn}.html`;
            
            try {
                const utf8Encode = new TextEncoder().encode(targetHtml);
                const binaryString = String.fromCodePoint(...utf8Encode);
                const base64Html = btoa(binaryString);

                const res = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${filePath}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `Macondo Matrix Record: ${autoTitle}`,
                        content: base64Html
                    })
                });
                
                if(res.ok) {
                    alert("🎉 记录成功！日历将在几秒后自动刷新。");
                    document.getElementById('in-original').value = '';
                    document.getElementById('in-analysis').value = '';
                    document.getElementById('viewport').scrollTo({ left: 0, behavior: 'smooth' });
                } else {
                    const err = await res.json();
                    alert("❌ 失败: " + err.message);
                }
            } catch(e) { alert("网络错误: " + e.message); }
            
            btn.innerText = "🚀 推送至云端矩阵"; btn.disabled = false;
        }

        function generateTemplate(title, orig, anal) {
            const safeOrig = escapeHTML(orig);
            const safeAnal = escapeHTML(anal);
            
            return `<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>${title}</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></scr` + `ipt>
    <style>
        :root { --bg: #fcfcfc; --surface: #ffffff; --text: #2c3e50; --border: #ecf0f1; --accent: #6c5ce7; --highlight: #fef9e7; }
        body { font-family: -apple-system, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; padding-bottom: 50px;}
        .nav-back { margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center;}
        .nav-back a { text-decoration: none; color: white; background: var(--text); padding: 8px 18px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .sync-status { font-size: 0.85rem; color: #27ae60; font-weight: bold; display: none; }
        
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 25px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .card-header { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: #95a5a6; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 12px; font-weight: bold;}
        
        .markdown-body { font-size: 1.05rem; line-height: 1.6; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { color: var(--accent); margin-top: 16px; margin-bottom: 8px; font-weight: 700; border-bottom: 1px dashed #eee; padding-bottom: 4px; }
        #view-original p { margin-bottom: 16px; color: #34495e; font-family: Georgia, serif; font-size: 1.15rem; line-height: 1.8; }
        #view-original p:last-child { margin-bottom: 0; }
        
        .markdown-body p { margin-top: 0; margin-bottom: 12px; }
        .markdown-body ul, .markdown-body ol { margin-top: 0; margin-bottom: 8px; padding-left: 20px; }
        .markdown-body li { margin-bottom: 4px; }
        .markdown-body blockquote { margin: 0 0 10px 0; padding: 10px 15px; background: var(--highlight); border-left: 5px solid #f1c40f; color: #5c4d22; font-family: Georgia, serif; font-size: 1.1rem; border-radius: 0 8px 8px 0; }
        .markdown-body hr { border: 0; border-top: 1px dashed #bdc3c7; margin: 15px 0; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 10px; font-size: 0.95rem; }
        .markdown-body th, .markdown-body td { border: 1px solid var(--border); padding: 8px; text-align: left; }
        .markdown-body th { background: #f8f9fa; color: var(--accent); }
        .edit-textarea { width: 100%; min-height: 150px; padding: 15px; font-family: monospace; font-size: 1.05rem; border: 2px solid var(--accent); border-radius: 10px; box-sizing: border-box; resize: vertical; display: none; background: #fff; color: #2c3e50; line-height: 1.5; outline: none; box-shadow: 0 4px 15px rgba(41,128,185,0.1);}
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-back">
            <a href="../../index.html">🔙 返回矩阵枢纽</a>
            <span class="sync-status" id="sync-status">📡 同步中...</span>
        </div>
        
        <textarea id="raw-original" style="display:none;">${safeOrig}</textarea>
        <textarea id="raw-analysis" style="display:none;">${safeAnal}</textarea>

        <div class="card">
            <div class="card-header">📖 原始文本 (Original)</div>
            <div id="view-original" class="markdown-body" style="white-space: pre-wrap; font-family: Georgia, serif; font-size: 1.15rem; line-height: 1.8; color: #34495e;"></div>
        </div>

        <div class="card" id="block-analysis">
            <div class="card-header">🔬 深度解构 (Analysis)</div>
            <div id="view-analysis" class="markdown-body"></div>
            <textarea id="edit-analysis" class="edit-textarea"></textarea>
        </div>
    </div>

    <script>
        const GH_OWNER = "moodHappy";
        const GH_REPO = "OneHundredYearsReading";

        function renderAll() {
            document.getElementById('view-original').textContent = document.getElementById('raw-original').value;
            const analContent = document.getElementById('raw-analysis').value;
            
            try {
                if (typeof marked !== 'undefined') {
                    document.getElementById('view-analysis').innerHTML = marked.parse(analContent);
                }
            } catch(e) { console.error("Markdown failed", e); }
        }
        window.onload = renderAll;

        const viewBlock = document.getElementById('view-analysis');
        const editBlock = document.getElementById('edit-analysis');
        const statusMsg = document.getElementById('sync-status');

        viewBlock.addEventListener('dblclick', triggerEdit);
        viewBlock.addEventListener('touchstart', e => {
            if (e.touches.length === 2) triggerEdit(); 
        });

        function triggerEdit() {
            viewBlock.style.display = 'none';
            editBlock.style.display = 'block';
            editBlock.value = document.getElementById('raw-analysis').value;
            editBlock.focus();
        }

        function escapeHTML(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        function reconstructSelfHTML(newAnal) {
            const orig = document.getElementById('raw-original').value;
            const safeOrig = escapeHTML(orig);
            const safeAnal = escapeHTML(newAnal);
            
            const template = \`<!DOCTYPE html>\n<html lang="zh-CN">\n<head>\n\` + document.head.innerHTML + \`\n</head>\n<body>\n\` +
            \`    <div class="container">\n\` +
            \`        <div class="nav-back">\n\` +
            \`            <a href="../../index.html">🔙 返回矩阵枢纽</a>\n\` +
            \`            <span class="sync-status" id="sync-status">📡 同步中...</span>\n\` +
            \`        </div>\n\n\` +
            \`        <textarea id="raw-original" style="display:none;">\${safeOrig}</textarea>\n\` +
            \`        <textarea id="raw-analysis" style="display:none;">\${safeAnal}</textarea>\n\n\` +
            \`        <div class="card">\n\` +
            \`            <div class="card-header">📖 原始文本 (Original)</div>\n\` +
            \`            <div id="view-original" class="markdown-body" style="white-space: pre-wrap; font-family: Georgia, serif; font-size: 1.15rem; line-height: 1.8; color: #34495e;"></div>\n\` +
            \`        </div>\n\n\` +
            \`        <div class="card" id="block-analysis">\n\` +
            \`            <div class="card-header">🔬 深度解构 (Analysis)</div>\n\` +
            \`            <div id="view-analysis" class="markdown-body"></div>\n\` +
            \`            <textarea id="edit-analysis" class="edit-textarea"></textarea>\n\` +
            \`        </div>\n\` +
            \`    </div>\n\n\` +
            \`    <script>\n\` + renderAll.toString() + \`\n\` +
            \`    window.onload = renderAll;\n\` +
            \`    const viewBlock = document.getElementById('view-analysis');\n\` +
            \`    const editBlock = document.getElementById('edit-analysis');\n\` +
            \`    const statusMsg = document.getElementById('sync-status');\n\` +
            \`    viewBlock.addEventListener('dblclick', triggerEdit);\n\` +
            \`    viewBlock.addEventListener('touchstart', e => { if (e.touches.length === 2) triggerEdit(); });\n\` +
            \`    \` + triggerEdit.toString() + \`\n\` +
            \`    \` + escapeHTML.toString() + \`\n\` +
            \`    \` + reconstructSelfHTML.toString() + \`\n\` +
            \`    const GH_OWNER = "\${GH_OWNER}"; const GH_REPO = "\${GH_REPO}";\n\` +
            \`    editBlock.addEventListener('blur', \` + editBlock.onblur.toString() + \`);\n\` +
            \`    </scr\` + \`ipt>\n</body>\n</html>\`;
            return template;
        }

        editBlock.onblur = async function() {
            const newText = editBlock.value.trim();
            const oldText = document.getElementById('raw-analysis').value.trim();
            
            editBlock.style.display = 'none';
            viewBlock.style.display = 'block';
            
            if (newText && newText !== oldText) {
                document.getElementById('raw-analysis').value = newText;
                renderAll();
                
                const token = localStorage.getItem('GH_TOKEN');
                if(!token) return;

                statusMsg.style.display = 'block';
                statusMsg.style.color = '#2980b9';
                statusMsg.innerText = '📡 静默同步中...';
                
                const pureHtml = reconstructSelfHTML(newText);
                const path = window.location.pathname;
                const fileRelPath = path.substring(path.indexOf('docs/'));
                
                try {
                    const utf8Encode = new TextEncoder().encode(pureHtml);
                    const binaryString = String.fromCodePoint(...utf8Encode);
                    const base64Html = btoa(binaryString);

                    const getRes = await fetch(\`https://api.github.com/repos/\${GH_OWNER}/\${GH_REPO}/contents/\${fileRelPath}\`, {
                        headers: { 'Authorization': \`token \${token}\` }
                    });
                    const fileData = await getRes.json();
                    
                    const putRes = await fetch(\`https://api.github.com/repos/\${GH_OWNER}/\${GH_REPO}/contents/\${fileRelPath}\`, {
                        method: 'PUT',
                        headers: { 'Authorization': \`token \${token}\`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            message: \`Auto-save analysis update\`,
                            content: base64Html,
                            sha: fileData.sha
                        })
                    });
                    
                    if(putRes.ok) {
                        statusMsg.style.color = '#27ae60';
                        statusMsg.innerText = '✅ 云端已同步';
                        setTimeout(() => statusMsg.style.display = 'none', 3000);
                    } else {
                        statusMsg.style.color = '#e74c3c';
                        statusMsg.innerText = '❌ 同步失败';
                    }
                } catch(e) {
                    statusMsg.style.color = '#e74c3c';
                    statusMsg.innerText = '❌ 网络断开';
                }
            }
        };
        editBlock.addEventListener('blur', editBlock.onblur);

    </scr` + `ipt>
</body>
</html>`;
        }
    </script>
</body>
</html>
