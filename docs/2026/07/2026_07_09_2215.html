        <textarea id="raw-analysis" style="display:none;"># 📌 完整翻译

吉卜赛人沿着那条路线航行了六个月，才到达那片陆地——运送邮件的骡队经过的地方。

---

# 📘 英语教学式讲解

## 1. The gypsies sailed along that route
- 吉卜赛人沿着那条路线航行。

### sail along
- 沿着……航行。

例如：

- They sailed along the coast.
  他们沿着海岸航行。

👉 **sail** 通常用于船只航行，但这里因为前文是巨大沼泽和水域，所以符合语境。

---

## 2. for six months
- 持续了六个月。

👉 **for + 时间段**

表示动作持续时间。

例如：

- He lived there for ten years.
  他在那里住了十年。

---

## 3. before they reached the strip of land
- 直到他们到达那片狭长的土地。

### before
这里不是简单“在……之前”，而是：

&gt; 经过一段时间之后才……

例如：

- It took hours before he arrived.
  过了几个小时他才到达。

---

### strip of land
- 一条狭长的陆地。

strip：
- 条状物。

例如：

- a strip of paper
  一条纸带

- a strip of land
  一片狭长土地

---

## 4. over which the mules that carried the mail passed
- 邮件运输骡队经过的地方。

这是一个比较复杂的定语从句。

结构：

&gt; the strip of land  
&gt; over which the mules passed

意思：

&gt; 骡子经过的那片土地。

---

### over which
为什么用 **over**？

因为：

&gt; pass over land

表示：

&gt; 经过、越过某片土地。

---

### the mules that carried the mail

- 携带邮件的骡子。

结构：

&gt; mules + that carried the mail

定语从句修饰：

&gt; mules

---

# 📌 句子结构分析

主干：

&gt; The gypsies sailed along that route for six months

↓

时间：

&gt; before they reached...

↓

地点：

&gt; the strip of land

↓

修饰：

&gt; over which the mules passed

---

# 📌 Language Note

这一句的重点不是动作本身，而是表现马孔多的**孤立性**。

关键对比：

### 吉卜赛人：

&gt; sailed for six months

需要漫长旅程才能到达。

↓

### 普通世界：

&gt; mail-carrying mules

已经有固定路线。

说明：

马孔多虽然与外界存在联系，但仍然处于极其偏远的位置。

---

# 📌 Key Expressions

- gypsy —— 吉卜赛人（现代常称 Roma/Romani people）
- sail along —— 沿着……航行
- route —— 路线
- for six months —— 持续六个月
- before —— 直到……才
- reach —— 到达
- strip of land —— 狭长土地
- carry the mail —— 运送邮件
- pass over —— 经过；越过</textarea>
