# 📘 英语教学式讲解

## 1. Those who had known him
- 那些认识他的人。
- those who：那些……的人（定语从句结构）。
- had known：过去完成时，表示“在更早时间就已经认识”。

👉 强调“长期熟悉他的人”。

---

## 2. since the foundation of Macondo
- 自马孔多建立以来。
- since：自从。
- foundation：建立、创立。
- Macondo：马孔多（小说中的虚构城镇）。

👉 “foundation”强调历史起点。

---

## 3. were startled
- 感到震惊。
- startled：受惊的、震惊的。

👉 比 “surprised” 更强烈，带突发冲击感。

---

## 4. at how much he had changed
- 对他变化之大感到震惊。
- how much he had changed：他变化的程度（强调量化程度）。

👉 不是“改变”，而是“改变的幅度”。

---

## 5. under Melquíades&#039; influence
- 在梅尔基亚德斯的影响下。
- under... influence：在……影响之下。

👉 “under”强调被支配/被塑造状态。

---

# 📌 Language Note

这一句是**人物心理与群体认知对比结构**。

## 1. 时间对比
- had known (past experience)
- had changed (resulting transformation)

👉 过去 vs 现在的断裂

---

## 2. 影响机制
- under Melquíades’ influence

👉 Melquíades不仅是角色，更像：
&gt; 一种“知识系统/认知力量”

---

## 3. 叙事功能

这一句的作用是：
- 从外部视角确认 José Arcadio Buendía 的“认知变形”
- 将个人变化社会化（everyone notices）

---

## 核心含义：

&gt; 知识输入（Melquíades） → 导致人格结构改变 → 社会可见性震惊

---

# 📌 Key Expressions

- those who had known him —— 那些曾认识他的人

- Macondo —— 马孔多
- be startled —— 感到震惊
- how much —— 多么大程度
- had changed —— 已经改变（过去完成时）
- under the influence of —— 在……影响下
