在他的家中乃至整个聚落中，被禁止饲养的唯一动物是斗鸡。

# 📘 英语教学式讲解

## 1. The only animals that were prohibited
- 唯一被禁止的动物。
- the only animals：唯一的动物种类。
- that were prohibited：被禁止的（定语从句）。

👉 被动语态强调“规则/禁令”本身。

---

## 2. not just in his house but in the entire settlement
- 不仅在他家里，而且在整个聚落中。
- not just... but...：不仅……而且……
- settlement：定居点、聚落。

👉 这是典型的“范围扩展”结构，强调禁令的普遍性。

---

## 3. were fighting cocks
- 是斗鸡。
- fighting cocks：用于斗鸡比赛的公鸡。

👉 “cock” 在这里指公鸡，不带粗俗含义。

---

## 4. Úrsula&#039;s capacity for work
- 乌尔苏拉的劳动能力。
- capacity for work：工作能力、劳动强度。

---

## 5. was the same as that of her husband
- 和她丈夫一样。
- the same as that of：与……相同。
  - that of = “the capacity of her husband”的替代避免重复。

👉 **that of** 是高级指代结构，用来避免重复名词。

---

# 📌 Language Note

这一段包含两个信息层：

### 1. 社会规则层
- 禁止斗鸡（fighting cocks）
- 范围扩大到整个 settlement

👉 体现马孔多早期“秩序化/规训化”的社会结构。

---

### 2. 家庭结构层
- Úrsula 与 José Arcadio Buendía 在劳动能力上“对等”

👉 这句话很关键，它在小说中暗示：
- 乌尔苏拉并非附属角色
- 她是维持整个家族与社区运作的核心力量之一

---

# 📌 Key Expressions

- the only... that —— 唯一……
- be prohibited —— 被禁止
- not just... but also... —— 不仅……而且……
- entire settlement —— 整个聚落
- fighting cocks —— 斗鸡
- capacity for work —— 劳动能力
- the same as that of —— 与……相同（避免重复结构）
