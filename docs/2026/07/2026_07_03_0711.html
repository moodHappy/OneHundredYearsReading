# 📘 英语教学式讲解

## 1. Those who remembered
- 那些还记得的人。
- those who：那些……的人（定语从句结构）。
- remembered：记得、回想起。

👉 引导一个“记忆群体”。

---

## 2. his gums that had been destroyed by scurvy
- 他曾因坏血病而被破坏的牙龈。
- gums：牙龈。
- had been destroyed：过去完成时被动语态（已经被破坏）。
- scurvy：坏血病（维生素C缺乏症）。

👉 “scurvy”带有历史性与贫困/航海病症联想。

---

## 3. his flaccid cheeks
- 他松弛的脸颊。
- flaccid：松弛的、无力的。

👉 强烈的身体衰败描写。

---

## 4. and his withered lips
- 以及他干枯的嘴唇。
- withered：枯萎的、干瘪的（常用于植物，这里用于人体）。

👉 人体植物化修辞（衰败感强化）。

---

## 5. trembled with fear
- 因恐惧而颤抖。
- trembled：颤抖。
- with fear：因为恐惧。

---

## 6. at the final proof of the gypsy&#039;s supernatural power
- 在吉普赛人超自然力量的最终证明面前。
- final proof：最终证据、最终验证。
- supernatural power：超自然力量。

👉 “proof”在这里具有戏剧性：
&gt; 不是科学证明，而是“奇迹展示的证据”。

👉 真实、衰败、可验证的身体状态。

### 2. 当前的奇迹冲击

👉 与前面形成绝对对立：

---

### 3. 群体心理效果

👉 “记忆者”成为最恐惧的人，因为他们最清楚“变化的不可思议程度”。
