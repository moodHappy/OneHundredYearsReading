        <textarea id="raw-analysis" style="display:none;"># 📌 完整翻译

何塞·阿尔卡蒂奥·布恩迪亚原本是一个干净利落、勤奋能干的人，后来却变成了一个外表懒散、衣着邋遢、胡须蓬乱的人。乌尔苏拉费了九牛二虎之力，才用一把厨房刀把他的胡子修剪整齐。

---

# 📘 英语教学式讲解

## 1. From a clean and active man
- 从一个干净利落、勤奋能干的人。
- from...to...：从……变成……
- clean：整洁的。
- active：勤快的、充满活力的。

👉 **active** 在这里不是“爱运动”，而是：
&gt; 勤奋、积极、精力充沛。

---

## 2. José Arcadio Buendía changed into
- 何塞·阿尔卡蒂奥·布恩迪亚变成了……
- change into：变成、转变为。

固定搭配：

- Water changes into ice.
- He changed into a different person.

---

## 3. a man lazy in appearance
- 一个看起来懒散的人。
- lazy in appearance：外表显得懒散。

👉 不是说他真的懒，而是：
&gt; 看起来毫无精神、不修边幅。

---

## 4. careless in his dress
- 衣着邋遢。
- careless：不讲究的。
- dress：穿着、衣着。

👉 **careless in one&#039;s dress** 是书面表达：
&gt; 穿衣不修边幅。

---

## 5. with a wild beard
- 留着一把乱蓬蓬的胡子。
- wild：杂乱的、蓬乱的。

不是“野生”，而是：
&gt; 未经修整。

---

## 6. that Úrsula managed to trim
- 乌尔苏拉设法把它修剪了。
- manage to：设法做到。
- trim：修剪。

👉 **manage to** 暗示：
&gt; 很困难，但最终成功。

---

## 7. with great effort and a kitchen knife
- 费了很大的力气，用一把厨房刀。
- with great effort：费了很大力气。
- kitchen knife：菜刀、厨房刀。

👉 这里充满生活细节：

乌尔苏拉甚至没有专业工具，只能用厨房里的刀帮丈夫修胡子。

# 📌 Language Note

这一段是**人物形象前后对照**。

结构非常清晰：

### 过去

- clean
- active

↓

### 现在

- lazy in appearance
- careless in his dress
- wild beard

↓

### 乌尔苏拉的补救

- managed to trim
- with great effort
- kitchen knife

---

## 核心文学作用

这不仅是在描写外貌变化，更是在表现：

&gt; **精神状态已经外化为身体状态。**

以前：

- 关注家庭
- 关注村庄
- 仪表整洁

后来：

- 沉迷幻想
- 忽视现实
- 连基本仪容都不再打理

而乌尔苏拉仍努力维持家庭秩序，甚至亲自帮他修剪胡须，这也体现了她始终是家庭的支柱。

---

- lazy in appearance —— 外表懒散
- careless in one&#039;s dress —— 衣着不修边幅
- wild beard —— 蓬乱的胡须
- manage to do —— 设法做到
- trim —— 修剪
