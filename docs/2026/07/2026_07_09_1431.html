有许多人认为他中了某种奇怪魔法的受害者。

但是，即使那些最确信他已经疯狂的人，在他拿出工具准备开垦土地，并请求聚集起来的人们开辟一条道路，让马孔多能够与外界伟大的发明相连接时，也纷纷放下工作和家庭，跟随他一起行动。

---

# 📘 英语教学式讲解

## 1. There were many who considered him the victim of some strange spell.
- 有许多人认为他是某种奇怪魔法的受害者。

### 结构：

&gt; There were many + who...

表示：

&gt; 有许多人……

例如：
- There were many who disagreed with him.
  有许多人不同意他。

---

### considered him the victim
- 认为他是受害者。

结构：

&gt; consider + 宾语 + 名词

表示：

&gt; 认为某人/某物是……

例如：
- They considered him a genius.
  他们认为他是天才。

---

### some strange spell
- 某种奇怪的魔法。

- spell：
  魔法、咒语。

这里不是“拼写”。

两个常见含义：

1. spell a word  
   拼写一个词

2. cast a spell  
   施魔法

---

# 2. But even those most convinced of his madness
- 但是，即使那些最相信他疯狂的人……

结构：

&gt; those convinced of...

= 那些相信……的人。

---

### convinced of his madness

- convinced：
  坚信的。

- madness：
  疯狂。

👉 **be convinced of something**

表示：

&gt; 深信某事。

例如：

- She was convinced of his honesty.
  她相信他的诚实。

---

# 3. left work and family to follow him
- 放下工作和家庭去跟随他。

（原文中的 “left work family” 应为 **left work and family**，缺少 and。）

### leave A to do B

表示：

&gt; 离开A去做B。

这里：

- leave work and family
  离开工作和家庭

- follow him
  跟随他

---

# 4. when he brought out his tools
- 当他拿出工具时。

- bring out：
  拿出、取出。

例如：

- He brought out a book.
  他拿出一本书。

---

# 5. to clear the land
- 为了开垦土地。

- clear：
  清理、清除。

- clear the land：
  清除土地上的障碍，使其可以使用。

例如：

- They cleared the forest.
  他们砍伐森林开辟土地。

---

# 6. asked the assembled group to open a way
- 请求聚集起来的人开辟一条道路。

- assembled：
  聚集起来的。

- group：
  群体。

- open a way：
  开辟道路。

👉 **open a way** 是比喻表达：

&gt; 创造通路、打开机会。

---

# 7. that would put Macondo in contact with the great inventions
- 让马孔多与伟大的发明相连接。

结构：

&gt; a way that would...

定语从句修饰：

&gt; a way

---

### put A in contact with B

固定表达：

&gt; 使A接触B，使A与B建立联系。

例如：

- The internet puts people in contact with the world.
  互联网让人们与世界联系起来。

---

# 📌 Language Note

这一段展现了 José Arcadio Buendía 人物形象的矛盾：

## 普通人的看法：

&gt; victim of some strange spell  
&gt; madness

村民认为他：

- 着魔
- 疯狂
- 脱离现实

---

## 但实际反应：

&gt; left work and family to follow him

即使认为他疯了，人们仍然跟随他。

原因：

他的疯狂中包含：

- 探索精神
- 建设愿望
- 对未来的想象

---

# 📌 句子结构分析

主干：

&gt; There were many [who considered him the victim of some strange spell].

↓

转折：

&gt; But even those...

↓

让步：

&gt; even those most convinced of his madness

↓

动作：

&gt; left work and family to follow him

↓

目的：

&gt; to open a way that would put Macondo in contact with the great inventions

---

# 📌 Key Expressions

- there were many who... —— 有许多人……
- consider A B —— 认为A是B
- victim of —— ……的受害者
- strange spell —— 奇怪的魔法
- be convinced of —— 坚信……
- madness —— 疯狂
- leave work and family —— 放下工作和家庭
- follow someone —— 跟随某人
- bring out —— 拿出
- clear the land —— 开垦土地
- assembled group —— 聚集的人群
- open a way —— 开辟道路
- put A in contact with B —— 使A与B建立联系</textarea>
