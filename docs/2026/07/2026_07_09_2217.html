        <textarea id="raw-analysis" style="display:none;"># 📌 完整翻译

根据何塞·阿尔卡蒂奥·布恩迪亚的计算，唯一能够与文明取得联系的可能性，就在北方那条路线。

于是，他把开垦工具和狩猎武器分发给那些曾经陪伴他建立马孔多的人。

他把自己的方向仪器和地图装进一个背包，然后开始了这场鲁莽的冒险。

---

# 📘 英语教学式讲解

## 1. According to José Arcadio Buendía&#039;s calculations
- 根据何塞·阿尔卡蒂奥·布恩迪亚的计算。

### according to
- 根据……

常用于：

- according to experts
  根据专家意见

- according to the data
  根据数据

---

### calculations
- 计算、推算。

这里不是简单数学题，而是：

&gt; 经过推理后的判断。

---

## 2. the only possibility contact with civilization lay along the northern route

这句原文有一个小错误：

应理解为：

&gt; the only possibility of contact with civilization...

即：

&gt; 与文明取得联系的唯一可能。

---

### possibility of contact with...
- 与……接触的可能性。

---

### civilization
- 文明、文明世界。

这里不是抽象概念，而是指：

&gt; 马孔多之外的外部世界。

---

### lay along the northern route
- 位于北方路线。

### lay
- lie（位于）的过去式。

例如：

- A village lies beyond the mountain.
  山后有一个村庄。

---

# 3. So he handed out clearing tools and hunting weapons
- 所以他分发了开垦工具和狩猎武器。

### hand out
- 分发。

例如：

- They handed out food.
  他们分发食物。

---

### clearing tools
- 开荒工具。

clear the land：
&gt; 清理土地、开垦土地。

---

### hunting weapons
- 狩猎武器。

---

# 4. to the same men who had been with him during the founding of Macondo

- 给那些在建立马孔多时就跟随他的同一批人。

结构：

&gt; the same men who...

表示：

&gt; 正是那些……

---

### had been with him
过去完成时：

&gt; 在过去某个时间点之前已经陪伴他。

这里指：

建立马孔多之前和他一起迁徙的人。

---

### during the founding of Macondo
- 在建立马孔多期间。

founding：
- 建立、创立。

---

# 5. He threw his directional instruments and his maps into a knapsack
- 他把方向仪器和地图扔进背包。

### throw ... into ...
- 把……放进……

这里的 throw 不一定表示粗暴扔，而是：

&gt; 快速放入。

---

### directional instruments
- 方向仪器。

例如：

- compass（指南针）
- navigation tools（导航工具）

---

### knapsack
- 背包。

比 backpack 更有探险时代的感觉。

---

# 6. and he undertook the reckless adventure

- 然后他开始了这场鲁莽的冒险。

### undertake
- 承担、开始进行。

正式用词。

例如：

- undertake a project
  开展一个项目。

---

### reckless
- 鲁莽的、不顾后果的。

例如：

- reckless decision
  鲁莽的决定。

---

# 📌 Language Note

这一段展现了 José Arcadio Buendía 的核心性格：

## 1. 理性计算

&gt; According to his calculations

他不是盲目行动，而是依靠自己的推理。

---

## 2. 实际行动

&gt; handed out tools and weapons

他会组织人，而不是只幻想。

---

## 3. 冒险精神

&gt; undertook the reckless adventure

但他的探索欲超过了现实限制。

---

这也是马尔克斯笔下这个人物最矛盾的地方：

&gt; 他既像科学家，又像梦想家。

他追求文明，却又不断被未知世界吸引。

---

# 📌 Key Expressions

- according to —— 根据……
- calculation —— 计算；推算
- possibility of contact —— 联系的可能性

- northern route —— 北方路线
- lie along —— 位于……
- hand out —— 分发
- clearing tools —— 开荒工具
- hunting weapons —— 狩猎武器
- founding of —— 建立……
- directional instruments —— 方向仪器
- knapsack —— 背包
- undertake —— 开始进行；承担
- reckless adventure —— 鲁莽的冒险</textarea>

            if (newText && newText !== oldText) {
                document.getElementById('raw-original').value = newText;
                renderAll();
                await saveToGitHub();
            }
        });

        const viewAnal = document.getElementById('view-analysis');
        const editAnal = document.getElementById('edit-analysis');
        viewAnal.addEventListener('dblclick', triggerEditAnal);
        viewAnal.addEventListener('touchstart', e => { if (e.touches.length === 2) triggerEditAnal(); });
        editAnal.addEventListener('blur', async function() {
            const newText = this.value.trim();
            const oldText = document.getElementById('raw-analysis').value.trim();
            this.style.display = 'none';
            viewAnal.style.display = 'block';
            if (newText && newText !== oldText) {
                document.getElementById('raw-analysis').value = newText;
                renderAll();
                await saveToGitHub();
            }
        });
    </script>
</body>
</html>
