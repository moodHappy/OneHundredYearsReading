# 📘 英语教学式讲解

## 1. Along with those items
- 除了那些物品之外。
- along with：连同、以及。
- those items：那些物品。

👉 用于扩展前文列举内容。

---

## 2. Melquíades left samples
- 梅尔基亚德斯留下了样品。
- left：留下、遗留。
- samples：样品、试验材料。

---

## 3. the formulas of the seven metals
- 七种金属的配方。
- formulas：配方、公式（复数）。
- seven metals：七种金属。

👉 这里“金属”带有炼金术体系色彩，而非现代化学分类。

---

## 4. that corresponded to the seven planets
- 这些金属与七颗行星相对应。
- corresponded to：对应、相匹配。
- seven planets：七颗行星（古典占星体系）。

👉 指的是古代“金属—行星对应体系”：
&gt; 每种金属对应一个天体象征。

---

## 5. the formulas of Moses and Zosimus
- 摩西与佐西默斯的炼金公式。
- Moses：这里象征传说中的神秘智慧源。
- Zosimus：古代炼金术士（佐西默斯·帕诺波利斯）。

👉 这是**宗教 + 炼金术权威引用混合**。

---

## 6. for doubling the quantity of gold
- 用于使黄金数量翻倍。
- doubling：加倍。
- quantity of gold：黄金数量。

👉 炼金术核心目标之一：点金/增金。

---

## 7. a set of notes and sketches
- 一套笔记与草图。
- notes：笔记。
- sketches：草图。

👉 表示未系统化的知识记录。

---

## 8. concerning the processes of the Great Teaching
- 关于“大教义”过程。
- concerning：关于。
- Great Teaching：大教义（炼金术体系中的神秘知识体系）。

👉 带有宗教/秘传知识意味。

---

## 9. that would permit those who could interpret them
- 这些内容将使那些能够解读它们的人。
- permit：允许、使能够。
- interpret：解释、解读。

👉 强调“知识的门槛”。

---

## 10. to undertake the manufacture of the philosopher&#039;s stone
- 得以开始炼制“哲学之石”。
- undertake：着手进行。
- manufacture：制造。
- philosopher’s stone：哲学之石（炼金术终极目标）。

        const editOrig = document.getElementById('edit-original');
        viewOrig.addEventListener('dblclick', triggerEditOrig);
        viewOrig.addEventListener('touchstart', e => { if (e.touches.length === 2) triggerEditOrig(); });
        editOrig.addEventListener('blur', async function() {
            const newText = this.value.trim();
            const oldText = document.getElementById('raw-original').value.trim();
            this.style.display = 'none';
            viewOrig.style.display = 'block';
            if (newText && newText !== oldText) {
                document.getElementById('raw-original').value = newText;
                renderAll();
                await saveToGitHub();
            }
        });

        // 绑定解析块事件
        const viewAnal = document.getElementById('view-analysis');
        const editAnal = document.getElementById('edit-analysis');
        viewAnal.addEventListener('dblclick', triggerEditAnal);
        viewAnal.addEventListener('touchstart', e => { if (e.touches.length === 2) triggerEditAnal(); });
        editAnal.addEventListener('blur', async function() {
            const newText = this.value.trim();
            const oldText = document.getElementById('raw-analysis').value.trim();
            this.style.display = 'none';
            viewAnal.style.display = 'block';
            if (newText && newText !== oldText) {
                document.getElementById('raw-analysis').value = newText;
                renderAll();
                await saveToGitHub();
            }
        });
    </script>
</body>
