# 📘 英语教学式讲解

## 1. Active, small, severe
- 精力充沛、身材娇小、神情严厉。
- 三个并列形容词，构成**人物速写式刻画**：
  - active：活跃的、精力旺盛的
  - small：身材娇小的
  - severe：严厉的、神情严肃的

👉 英语中这种“无动词形容词堆叠”常用于文学人物描写。

---

## 2. that woman of unbreakable nerves
- 那位拥有坚不可摧神经的女人。
- of unbreakable nerves：名词结构，表示“具有……特质的”。

👉 “of + 抽象名词”是书面语中强化特质的结构：
- a man of courage（勇敢的人）
- a woman of strength（坚强的女人）

---

## 3. who at no moment in her life had been heard to sing
- 她一生中从未被人听见唱歌。
- at no moment：从未（强否定结构）。
- had been heard to sing：被听见唱歌（被动语态 + 完成时）。

👉 “at no moment” 比 “never” 更强调绝对否定语气。

---

## 4. seemed to be everywhere
- 似乎无处不在。
- seemed to be：似乎是……
- everywhere：到处、无处不在。

👉 表达人物“存在感极强”。

---

## 5. from dawn until quite late at night
- 从清晨一直到很晚的夜里。
- dawn：黎明。
- quite late at night：深夜。

👉 时间跨度强调“持续劳动”。

---

## 6. always pursued by the soft whispering
- 总是被轻柔的窸窣声所追随。
- pursued by：被……追逐。
- whispering：轻声、窸窣声。

👉 “pursued” 本义是“追逐”，在这里形成拟人化效果。

---

## 7. stiff, starched petticoats
- 僵硬、浆过的衬裙。
- stiff：僵硬的。
- starched：上浆的（经过淀粉处理使衣物挺括）。
- petticoats：衬裙（女性内裙）。

👉 这里是非常典型的马尔克斯式细节：
- 用衣物的声音/质感来塑造人物存在感

# 📌 Language Note

这一段不是在“讲事情”，而是在做**人物密度描写（character density portrait）**：

### 1. 外在层
- active / small / severe

### 2. 性格层
- unbreakable nerves（情绪稳定、极度坚韧）
- never heard to sing（无情绪外露）

### 3. 运动层
- everywhere（空间扩散）

### 4. 声音层（关键意象）
- soft whispering petticoats

👉 最重要的修辞是：

&gt; 人物不再通过“行为”存在，而是通过“声音与物体的摩擦感”存在。

这种写法是马尔克斯常见的“具象化存在感”。

                await saveToGitHub();
            }
        });
