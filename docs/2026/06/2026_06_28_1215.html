<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>是计算机技术</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #fcfcfc; --surface: #ffffff; --text: #2c3e50; --border: #ecf0f1; --accent: #2980b9; --highlight: #fef9e7; }
        body { font-family: -apple-system, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; margin: 0; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; padding-bottom: 50px;}
        .nav-back { margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center;}
        .nav-back a { text-decoration: none; color: white; background: var(--text); padding: 8px 18px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .sync-status { font-size: 0.85rem; color: #27ae60; font-weight: bold; display: none; }
        
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .card-header { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: #95a5a6; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; font-weight: bold;}
        
        .markdown-body { font-size: 1.05rem; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { color: var(--accent); margin-top: 25px; margin-bottom: 12px; font-weight: 700; border-bottom: 1px dashed #eee; padding-bottom: 5px; }
        .markdown-body h3 { font-size: 1.2rem; }
        .markdown-body p { margin-top: 0; margin-bottom: 15px; }
        .markdown-body blockquote { margin: 0 0 15px 0; padding: 12px 18px; background: var(--highlight); border-left: 5px solid #f1c40f; color: #5c4d22; font-family: Georgia, serif; font-size: 1.15rem; border-radius: 0 8px 8px 0; }
        .markdown-body hr { border: 0; border-top: 1px dashed #bdc3c7; margin: 25px 0; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 15px; font-size: 0.95rem; }
        .markdown-body th, .markdown-body td { border: 1px solid var(--border); padding: 12px; text-align: left; }
        .markdown-body th { background: #f8f9fa; color: var(--accent); }
        
        /* 无痕静默编辑区 */
        .edit-textarea { width: 100%; min-height: 250px; padding: 15px; font-family: monospace; font-size: 1.05rem; border: 2px solid var(--accent); border-radius: 10px; box-sizing: border-box; resize: vertical; display: none; background: #fff; color: #2c3e50; line-height: 1.5; outline: none; box-shadow: 0 4px 15px rgba(41,128,185,0.1);}
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-back">
            <a href="../../index.html">🔙 返回矩阵枢纽</a>
            <span class="sync-status" id="sync-status">📡 同步中...</span>
        </div>
        
        <textarea id="raw-original" style="display:none;">是计算机技术</textarea>
        <textarea id="raw-analysis" style="display:none;">大将军点击</textarea>

        <div class="card">
            <div class="card-header">📖 原始文本 (Original)</div>
            <div id="view-original" class="markdown-body" style="white-space: pre-wrap; font-family: Georgia, serif; font-size: 1.15rem; line-height: 1.8; color: #34495e;"></div>
        </div>

        <div class="card" id="block-analysis">
            <div class="card-header">🔬 深度解构 (Analysis)</div>
            <div id="view-analysis" class="markdown-body"></div>
            <textarea id="edit-analysis" class="edit-textarea"></textarea>
        </div>
    </div>

    <script>
        const GH_OWNER = "moodHappy";
        const GH_REPO = "OneHundredYearsReading";

        function renderAll() {
            document.getElementById('view-original').textContent = document.getElementById('raw-original').value;
            const analContent = document.getElementById('raw-analysis').value;
            
            if (typeof marked !== 'undefined') {
                document.getElementById('view-analysis').innerHTML = marked.parse(analContent);
            } else {
                document.getElementById('view-analysis').innerHTML = "<pre style='white-space:pre-wrap;'>" + analContent + "</pre>";
            }
        }
        window.onload = renderAll;

        const viewBlock = document.getElementById('view-analysis');
        const editBlock = document.getElementById('edit-analysis');
        const statusMsg = document.getElementById('sync-status');

        // 双指触摸或双击触发编辑 (仅限译文分析区)
        viewBlock.addEventListener('dblclick', triggerEdit);
        viewBlock.addEventListener('touchstart', e => {
            if (e.touches.length === 2) triggerEdit(); 
        });

        function triggerEdit() {
            viewBlock.style.display = 'none';
            editBlock.style.display = 'block';
            editBlock.value = document.getElementById('raw-analysis').value;
            editBlock.focus();
        }

        function utf8ToBase64(str) {
            return btoa(unescape(encodeURIComponent(str)));
        }

        function encodeHTML(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        // 失去焦点时：自动恢复视图，比对内容，静默推送到 GitHub！
        editBlock.addEventListener('blur', async () => {
            const newText = editBlock.value.trim();
            const oldText = document.getElementById('raw-analysis').value.trim();
            
            editBlock.style.display = 'none';
            viewBlock.style.display = 'block';
            
            if (newText && newText !== oldText) {
                // 更新隐形数据层并刷新视图
                document.getElementById('raw-analysis').value = newText;
                document.getElementById('raw-analysis').innerHTML = encodeHTML(newText);
                renderAll();
                
                // 执行静默同步
                await saveToGitHub();
            }
        });

        async function saveToGitHub() {
            const token = localStorage.getItem('GH_TOKEN');
            if(!token) {
                alert("编辑成功，但未检测到 Token，无法同步到云端！");
                return;
            }

            statusMsg.style.display = 'block';
            statusMsg.style.color = '#2980b9';
            statusMsg.innerText = '📡 静默同步中...';
            
            const newHtml = "<!DOCTYPE html>
<html lang="zh-CN">
" + document.documentElement.innerHTML + "
</html>";
            const path = window.location.pathname;
            const fileRelPath = path.substring(path.indexOf('docs/'));
            
            try {
                const getRes = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${fileRelPath}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const fileData = await getRes.json();
                
                const putRes = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${fileRelPath}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `Auto-save analysis update`,
                        content: utf8ToBase64(newHtml),
                        sha: fileData.sha
                    })
                });
                
                if(putRes.ok) {
                    statusMsg.style.color = '#27ae60';
                    statusMsg.innerText = '✅ 云端已同步';
                    setTimeout(() => statusMsg.style.display = 'none', 3000);
                } else {
                    statusMsg.style.color = '#e74c3c';
                    statusMsg.innerText = '❌ 同步失败';
                }
            } catch(e) {
                statusMsg.style.color = '#e74c3c';
                statusMsg.innerText = '❌ 网络断开';
            }
        }
    </script>
</body>
</html>
