        <textarea id="raw-analysis" style="display:none;"># 📌 完整翻译

他唯一成功做到的事情，就是挖出了一副15世纪的盔甲，这副盔甲所有部件都因铁锈而牢牢焊在一起，内部回荡着空洞的回声，像一个装满石头的巨大葫芦。

当何塞·阿尔卡蒂奥·布恩迪亚和他探险队的四个人设法将这副盔甲拆开时，他们发现里面是一具钙化的骸骨，脖子上挂着一个铜制小盒，里面装着一缕女人的头发。

---

# 📘 英语教学式讲解

## 1. The only thing he succeeded in doing was to unearth
- 他唯一成功做成的事情就是挖出……
- the only thing...was to...：唯一做成的事是……
- succeed in doing：成功做某事
- unearth：挖出、发掘（字面+考古语境）

---

## 2. a suit fifteenth-century armor
- 一整副15世纪的盔甲。
- suit of armor：一整套盔甲（固定搭配）
- fifteenth-century：15世纪的（复合形容词）

---

## 3. which had all of its pieces soldered together with rust
- 所有部件都因铁锈而粘连在一起。
- had...soldered together：被……焊接/粘合在一起（被动结构）
- rust：铁锈（在这里“像焊料一样”造成粘连）
- pieces：部件

---

## 4. and inside of which there was the hollow resonance
- 其内部有一种空洞的回响。
- inside of which：定语从句结构（= inside it）
- hollow resonance：空洞的回声
- resonance：共鸣、回响

---

## 5. of an enormous stone-filled gourd
- 像一个装满石头的巨大葫芦发出的声音。
- enormous：巨大的
- stone-filled：装满石头的
- gourd：葫芦（或干果壳容器）
- 比喻结构，强调“空洞+沉闷回响”

---

## 6. When José Arcadio Buendía and the four men of his expedition managed to take the armor apart
- 当何塞·阿尔卡蒂奥·布恩迪亚和他的四名探险队成员成功把盔甲拆开时。
- managed to：成功做到
- expedition：探险队
- take apart：拆开、分解

---

## 7. they found inside a calcified skeleton
- 他们在里面发现了一具钙化的骸骨。
- calcified：钙化的（长期埋藏后矿化）
- skeleton：骨骼、骸骨

---

## 8. with a copper locket containing a woman&#039;s hair around its neck
- 脖子上挂着一个铜制小盒，里面装着一缕女人的头发。
- copper locket：铜制小盒 / 项链盒
- containing：里面装着
- a woman&#039;s hair：一缕女性的头发
- around its neck：挂在它的脖子上

---

# 📌 Key Expressions

- succeed in doing —— 成功做某事
- unearth —— 挖出 / 发掘
- suit of armor —— 一整套盔甲
- soldered together —— 焊接在一起 / 粘连
- hollow resonance —— 空洞回响
- inside of which —— 其内部
- take apart —— 拆开
- calcified skeleton —— 钙化骸骨
- locket —— 小盒 / 项链盒
- around its neck —— 挂在脖子上
