何塞·阿尔卡蒂奥·布恩迪亚在漫长的雨季里，把自己关在房子后面的一间小屋中——那是他专门建造出来、为了不让任何人打扰他的实验。

他完全抛开了家庭责任，整夜待在院子里观察群星的运行轨迹；为了找到一种精确判断正午时刻的方法，他几乎因此中了暑。

---

# 📘 英语教学式讲解

## 1. José Arcadio Buendía spent the long months of the rainy season
- 何塞·阿尔卡蒂奥·布恩迪亚度过了漫长的雨季。
- spent：度过（时间）。
- the long months：漫长的几个月。
- the rainy season：雨季。

---

## 2. shut up in a small room
- 把自己关在一间小房间里。
- shut up：关起来、闭门不出。
- in a small room：在一间小屋里。
- 这里 **shut up** 是过去分词，描述主语所处的状态。

---

## 3. that he had built in the rear of the house
- 那间房子是他建在屋子后面的。
- that：引导定语从句，修饰 room。
- had built：过去完成时。
- in the rear of the house：在房屋后面。
- rear：后部（较正式）。

---

## 4. so that no one would disturb his experiments
- 为了不让任何人打扰他的实验。
- so that：为了（表示目的）。
- would disturb：会打扰。
- experiments：实验。

---

## 5. Having completely abandoned his domestic obligations
- 在彻底放弃家庭责任之后。
- Having abandoned...：现在分词完成式，表示动作先于主句发生。
- completely：完全地。
- domestic obligations：家庭责任、家务义务。

---

## 6. he spent entire nights in the courtyard
- 他整夜待在院子里。
- spent entire nights：整夜度过。
- courtyard：庭院、院子。

---

## 7. watching the course of the stars
- 观察星辰运行的轨迹。
- watching：持续观察。
- the course of the stars：群星运行的轨迹。
- course：运行路线、轨道。

---

## 8. and he almost contracted sunstroke
- 而且他差一点中暑。
- almost：几乎。
- contracted：染上、患上（疾病）。
- sunstroke：中暑。

---

## 9. from trying to establish
- 因为试图建立……
- from：表示原因。
- trying to：努力尝试。
- establish：建立、确立。

---

## 10. an exact method
- 一种精确的方法。
- exact：精确的。
- method：方法。

---

## 11. to ascertain noon
- 来确定正午时刻。
- ascertain：确定、查明（正式书面语）。
- noon：正午、中午十二点。

---

# 📌 Language Note

这一段进一步强化了布恩迪亚的人物形象。

他已经不只是**痴迷科学**，而是到了近乎疯狂的程度：

- **shut up in a small room** —— 把自己与外界隔绝。
- **abandoned his domestic obligations** —— 连家庭责任都完全放弃。
- **spent entire nights watching the stars** —— 通宵观星。
- **almost contracted sunstroke** —— 为了研究，几乎把身体累垮。

这些细节共同塑造了他执着、偏执而充满理想主义的性格。

---

- disturb somebody&#039;s experiments —— 打扰某人的实验
- abandon one&#039;s domestic obligations —— 放弃家庭责任
- spend entire nights doing... —— 整夜做……
- the course of the stars —— 星辰运行轨迹
- contract sunstroke —— 中暑
- establish a method —— 建立一种方法
- ascertain —— 确定、查明

            const oldText = document.getElementById('raw-original').value.trim();
            this.style.display = 'none';
            viewOrig.style.display = 'block';
            if (newText && newText !== oldText) {
                document.getElementById('raw-original').value = newText;
                renderAll();
                await saveToGitHub();
            }
        });

        // 绑定解析块事件
        const viewAnal = document.getElementById('view-analysis');
        const editAnal = document.getElementById('edit-analysis');
        viewAnal.addEventListener('dblclick', triggerEditAnal);
        viewAnal.addEventListener('touchstart', e => { if (e.touches.length === 2) triggerEditAnal(); });
        editAnal.addEventListener('blur', async function() {
            const newText = this.value.trim();
            const oldText = document.getElementById('raw-analysis').value.trim();
            this.style.display = 'none';
            viewAnal.style.display = 'block';
            if (newText && newText !== oldText) {
                document.getElementById('raw-analysis').value = newText;
                renderAll();
                await saveToGitHub();
            }
        });
    </script>
