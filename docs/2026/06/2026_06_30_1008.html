        <textarea id="raw-analysis" style="display:none;"># 📌 完整翻译

何塞·阿尔卡蒂奥·布恩迪亚神情平静，丝毫没有被妻子绝望的愤怒所吓倒。乌尔苏拉在一阵暴怒中，把那台星盘狠狠地砸在地上。

他又重新做了一台，把村里的男人们聚集到那间小屋里，并用一套谁也听不懂的理论向他们证明：只要始终朝东方航行，就有可能回到自己出发的地方。

---

# 📘 英语教学式讲解

## 1. José Arcadio Buendía, impassive
- 何塞·阿尔卡蒂奥·布恩迪亚神情平静。
- impassive：无动于衷的、面无表情的、镇定的。
- 这里是插入语，描述人物状态。

---

## 2. did not let himself be frightened
- 没有让自己被吓倒。
- let oneself be...：让自己……
- be frightened：受到惊吓。
- 整体表示“没有被……吓住”。

---

## 3. by the desperation of his wife
- 被妻子的绝望情绪。
- desperation：绝望、近乎失控的情绪。
- by：表示原因。

---

## 4. who, in a seizure of rage
- 她在一阵暴怒中……
- seizure：突然发作。
- a seizure of rage：怒火突然爆发（固定文学表达）。

---

## 5. mashed the astrolabe against the floor
- 把星盘狠狠砸向地面。
- mashed：猛砸、砸碎。
- astrolabe：**星盘**，古代用于测量天体位置和导航的仪器。
- against the floor：朝着地板猛砸。

---

## 6. He built another one
- 他又造了一台。
- another one：另一台（指新的星盘）。

---

## 7. he gathered the men of the village
- 他把村里的男人们召集起来。
- gathered：召集、聚集。
- the men of the village：村里的男人们。

---

## 8. in his little room
- 到他那间小屋里。
- little room：前文专门用于实验的小房间。

---

## 9. and he demonstrated to them
- 并向他们证明。
- demonstrate to somebody：向某人证明、演示。

---

## 10. with theories that none of them could understand
- 用一套他们谁也听不懂的理论。
- theories：理论。
- none of them：他们当中没有一个人。
- could understand：能够理解。

---

## 11. the possibility of returning to where one had set out
- 回到出发地点的可能性。
- possibility：可能性。
- return to：回到。
- where one had set out：自己出发的地方。
- set out：出发、启程。

---

## 12. by consistently sailing east
- 只要始终向东方航行。
- by：通过（表示方法）。
- consistently：始终如一地、持续不断地。
- sailing east：向东航行。

---

# 📌 Language Note

这一段讲述的是布恩迪亚推导出的一个重要结论：

&gt; **如果地球是圆的，那么一直向东航行，最终就会回到出发点。**

今天这是常识，但在马孔多村民眼中却像天方夜谭。

马尔克斯通过两组人物形成鲜明对比：

- **乌尔苏拉**：愤怒得把星盘砸碎，代表现实与家庭。
- **布恩迪亚**：马上重新制作仪器，继续向别人讲解理论，代表执着于知识与探索。

这也进一步刻画了他近乎偏执的求知精神。

---

- a seizure of rage —— 一阵暴怒
- astrolabe —— 星盘
- gather the men of the village —— 召集村民
- demonstrate to somebody —— 向某人证明
- theory —— 理论
- none of them —— 他们当中没有一个
- possibility of... —— ……的可能性
- set out —— 出发
- consistently —— 始终如一地

        viewOrig.addEventListener('touchstart', e => { if (e.touches.length === 2) triggerEditOrig(); });
        editOrig.addEventListener('blur', async function() {
            const newText = this.value.trim();
            const oldText = document.getElementById('raw-original').value.trim();
            this.style.display = 'none';
            viewOrig.style.display = 'block';
            if (newText && newText !== oldText) {
                document.getElementById('raw-original').value = newText;
                renderAll();
                await saveToGitHub();
            }
        });

        // 绑定解析块事件
        const viewAnal = document.getElementById('view-analysis');
        const editAnal = document.getElementById('edit-analysis');
        viewAnal.addEventListener('dblclick', triggerEditAnal);
        viewAnal.addEventListener('touchstart', e => { if (e.touches.length === 2) triggerEditAnal(); });
        editAnal.addEventListener('blur', async function() {
            const newText = this.value.trim();

            this.style.display = 'none';
            viewAnal.style.display = 'block';
            if (newText && newText !== oldText) {
                document.getElementById('raw-analysis').value = newText;
