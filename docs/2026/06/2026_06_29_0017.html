当时马孔多是一个由二十座土坯房组成的村庄，坐落在一条清澈河流的岸边。河水沿着一条被打磨得光滑的石床流淌，那些石头洁白而巨大，像史前的蛋一样。

# 📘 英语教学式讲解

## 1. At that time Macondo was a village of twenty adobe houses
- 那时，马孔多是一个由二十座土坯房组成的村庄。  
- At that time：在那个时候（时间背景）  
- Macondo：虚构地名（《百年孤独》中的核心城镇）  
- was a village of...：是一个由……组成的村庄  
- adobe houses：土坯房（用泥砖建造的房屋）  

---

## 2. built on the bank of a river of clear water
- 建在一条清澈河流的岸边。  
- built on：建造在……之上（过去分词作定语）  
- bank of a river：河岸  
- river of clear water：清澈的河流（of结构强调属性）  

---

## 3. that ran along a bed of polished stones
- 河水沿着一条被打磨光滑的石床流动。  
- that ran：引导定语从句，修饰 river  
- ran along：沿着……流动  
- bed of polished stones：被打磨过的石床（河床）  
- polished：打磨的 / 光滑的  

---

## 4. which were white and enormous
- 这些石头是白色而巨大的。  
- which were：非限制性定语从句，补充说明 stones  
- white and enormous：并列形容词结构  

---

## 5. like prehistoric eggs
- 像史前的蛋一样。  
- like：比喻（simile）  
- prehistoric eggs：史前蛋（强化原始、神秘、时间久远的视觉意象）  

---

# 📌 Key Expressions

- at that time —— 在那个时候  
- adobe houses —— 土坯房  
- on the bank of a river —— 在河岸上  
- river of clear water —— 清澈的河流  
- a bed of polished stones —— 被打磨的石床 / 河床  
- run along —— 沿着……流动  
- white and enormous —— 白色而巨大的
