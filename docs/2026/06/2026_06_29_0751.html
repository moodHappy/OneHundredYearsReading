        <textarea id="raw-analysis" style="display:none;"># 📌 完整翻译

“万物都有自己的生命。”那个吉普赛人用沙哑而浓重的口音宣告道。

“问题只在于把它们的灵魂唤醒。”

何塞·阿尔卡蒂奥·布恩迪亚那不受约束的想象力，总是超越大自然的天赋，甚至超越奇迹与魔法。他认为，可以利用这项看似毫无用处的发明，从大地的深处提取黄金。

梅尔基亚德斯是个诚实的人，他警告他说：“那东西办不到。”

---

# 📘 英语教学式讲解

## 1. &quot;Things have a life of their own,&quot;
- “万物都有自己的生命。”
- Things：事物、万物。
- have a life of their own：有属于自己的生命 / 有自己的意志（固定表达）。
- of their own：属于它们自己的，强调独立性。

---

## 2. the gypsy proclaimed with a harsh accent
- 那个吉普赛人用浓重而沙哑的口音宣告道。
- proclaimed：郑重宣布、宣称（比 said 更正式、更有气势）。
- harsh accent：浓重、生硬的口音。
- with...：表示说话方式。

---

## 3. &quot;It&#039;s simply a matter of waking up their souls.&quot;
- “这不过是把它们的灵魂唤醒而已。”
- It&#039;s simply a matter of...：只是……的问题（固定句型）。
- waking up：唤醒。
- their souls：它们的灵魂。
- a matter of doing：只是做……的问题。

---

## 4. José Arcadio Buendía
- 何塞·阿尔卡蒂奥·布恩迪亚。
- 本句真正的主语，人名后接较长的定语从句。

---

## 5. whose unbridled imagination
- 他的想象力毫无约束。
- whose：引导非限制性定语从句，表示“他的”。
- unbridled：不受约束的、奔放的。
- imagination：想象力。

---

## 6. always went beyond the genius of nature
- 总是超越大自然的创造力。
- went beyond：超越。
- genius：这里不是“天才”，而是“大自然巧夺天工的创造力”。
- the genius of nature：大自然的神奇创造。

---

## 7. and even beyond miracles and magic
- 甚至超越奇迹与魔法。
- even：甚至，进一步加强语气。
- miracles：奇迹。
- magic：魔法。
- beyond...and even beyond...：层层递进的修辞。

---

## 8. thought that it would be possible
- 认为这是有可能的。
- thought that：认为……
- it would be possible to...：有可能做某事（形式主语结构）。

---

## 9. to make use of that useless invention
- 利用那项毫无用处的发明。
- make use of：利用（固定搭配）。
- useless invention：无用的发明。
- that：特指前文的磁铁。

---

## 10. to extract gold from the bowels of the earth
- 从大地的深处提取黄金。
- extract：提取、开采。
- gold：黄金。
- the bowels of the earth：大地的腹中、地底深处（文学表达）。
- bowels：原意“内脏”，这里比喻“地球内部”。

---

## 11. Melquíades, who was an honest man
- 梅尔基亚德斯是一个诚实的人。
- who was an honest man：非限制性定语从句，补充说明人物品质。

---

## 12. warned him
- 警告了他。
- warn somebody：警告某人。

---

## 13. &quot;It won&#039;t work for that.&quot;
- “那东西对那个用途没用。”
- won&#039;t work：行不通、不会奏效。
- for that：用于那个目的（指寻找黄金）。

---

# 📌 Key Expressions

- have a life of one&#039;s own —— 有自己的生命（或意志）
- proclaim —— 郑重宣布
- with a harsh accent —— 带着浓重的口音
- it&#039;s simply a matter of... —— 这不过是……的问题
- wake up someone&#039;s soul —— 唤醒……的灵魂
- unbridled imagination —— 不受约束的想象力
- go beyond —— 超越
- the genius of nature —— 大自然的神奇创造力
- miracles and magic —— 奇迹与魔法
- make use of —— 利用
- extract gold —— 提取黄金
- the bowels of the earth —— 大地深处
- warn somebody —— 警告某人
- it won&#039;t work —— 行不通</textarea>
