        <textarea id="raw-analysis" style="display:none;"># 📌 完整翻译

当他成为使用和操纵自己仪器的专家之后，他形成了一种关于空间的观念，使他能够在未知的海洋上航行，访问无人居住的地区，并与壮丽的存在建立联系，而无需离开自己的书房。

那段时期，他养成了自言自语的习惯，在屋子里来回踱步，对任何人都视而不见；与此同时，乌尔苏拉和孩子们却在花园里辛苦劳作，几乎累弯了腰，种植香蕉、海芋、木薯、山药、南瓜根和茄子。

---

# 📘 英语教学式讲解

## 1. When he became an expert in the use and manipulation of his instruments
- 当他成为使用和操纵自己仪器的专家之后。
- became an expert in：成为……方面的专家。
- the use and manipulation of：使用与操作。
- instruments：仪器、工具（科学实验设备）。

---

## 2. he conceived a notion of space
- 他形成了一种关于“空间”的观念。
- conceived a notion：形成概念 / 构想。
- notion：观念、概念（比 idea 更抽象）。
- of space：关于空间。

---

## 3. that allowed him to navigate across unknown seas
- 这种观念使他能够在未知海域航行。
- allowed him to：使他能够……
- navigate：航行、导航。
- unknown seas：未知海洋。

---

## 4. to visit uninhabited territories
- 访问无人居住的地区。
- uninhabited：无人居住的。
- territories：地区、领土。

---

## 5. and to establish relations with splendid beings
- 并与“壮丽的存在”建立联系。
- establish relations with：与……建立联系。
- splendid beings：美妙的存在 / 奇异生物（带幻想色彩）。

---

## 6. without having to leave his study
- 而无需离开书房。
- without having to：不需要……
- study：书房、研究室。

---

## 7. That was the period in which he acquired the habit of talking to himself
- 那是他养成自言自语习惯的时期。
- period in which：那个时期（定语从句）
- acquire the habit of：养成……习惯
- talking to himself：自言自语

---

## 8. of walking through the house without paying attention to anyone
- 在屋子里走来走去，对任何人都不理会。
- walking through the house：在屋子里走动
- without paying attention to anyone：不理任何人

---

## 9. as Úrsula and the children broke their backs in the garden
- 与此同时，乌尔苏拉和孩子们在花园里辛苦劳作。
- as：在这里表示“同时发生”
- break their backs：拼命干活（字面“累弯了背”，强调极度辛劳）
- garden：花园、菜园

---

## 10. growing banana and caladium, cassava and yams
- 种植香蕉、海芋、木薯和山药。
- growing：种植
- banana / cassava / yams：热带作物
- caladium：海芋（一种观叶植物或块茎植物）

---

## 11. ahuyama roots and eggplants
- 南瓜根和茄子。
- ahuyama：南瓜类植物（南美用法）
- roots：根茎类作物
- eggplants：茄子

---

# 📌 Language Note

这一段呈现出强烈的**对比结构**：

- 一边是布恩迪亚：
  - 沉浸在抽象空间、宇宙、未知世界中
  - 在书房里“航行宇宙”

- 另一边是乌尔苏拉一家：
  - 在花园里辛苦劳作
  - 与泥土、植物、现实生活打交道

马尔克斯用这种并置，制造出典型的《百年孤独》张力：
&gt; 理想主义的“空间宇宙” vs 生存现实的“土地劳动”。

---

# 📌 Key Expressions

- become an expert in —— 成为……专家
- manipulation of instruments —— 仪器操作
- conceive a notion —— 形成概念
- navigate across —— 横跨航行
- unknown seas —— 未知海域
- uninhabited territories —— 无人区域
- establish relations with —— 与……建立联系
- without leaving... —— 不离开……
- acquire the habit of —— 养成……习惯
- talk to oneself —— 自言自语
- pay attention to —— 注意 / 理会
- break one&#039;s back —— 拼命干活 / 累弯腰
- grow crops —— 种植作物
- cassava / yams / eggplants —— 木薯 / 山药 / 茄子

                    statusMsg.innerText = '✅ 云端已同步';
                    setTimeout(() => statusMsg.style.display = 'none', 3000);
                } else {
                    statusMsg.style.color = '#e74c3c';
                    statusMsg.innerText = '❌ 同步失败';
                }
            } catch(e) {
                statusMsg.style.color = '#e74c3c';
                statusMsg.innerText = '❌ 网络断开';
            }
        };

        // 绑定原文块事件
        const viewOrig = document.getElementById('view-original');
        const editOrig = document.getElementById('edit-original');
        viewOrig.addEventListener('dblclick', triggerEditOrig);
        viewOrig.addEventListener('touchstart', e => { if (e.touches.length === 2) triggerEditOrig(); });
        editOrig.addEventListener('blur', async function() {
            const newText = this.value.trim();
            const oldText = document.getElementById('raw-original').value.trim();
            this.style.display = 'none';
            viewOrig.style.display = 'block';
            if (newText && newText !== oldText) {
                document.getElementById('raw-original').value = newText;
                renderAll();
                await saveToGitHub();
            }
        });

        // 绑定解析块事件
        const viewAnal = document.getElementById('view-analysis');
        const editAnal = document.getElementById('edit-analysis');
        viewAnal.addEventListener('dblclick', triggerEditAnal);
        viewAnal.addEventListener('touchstart', e => { if (e.touches.length === 2) triggerEditAnal(); });
        editAnal.addEventListener('blur', async function() {
            const newText = this.value.trim();
            const oldText = document.getElementById('raw-analysis').value.trim();
            this.style.display = 'none';
            viewAnal.style.display = 'block';
            if (newText && newText !== oldText) {
                document.getElementById('raw-analysis').value = newText;
                renderAll();
                await saveToGitHub();
            }
        });
    </script>
</body>
</html>
