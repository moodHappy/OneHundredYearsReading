# 📘 英语教学式讲解

## 1. José Arcadio Buendía made no attempt to console her
- 何塞·阿尔卡蒂奥·布恩迪亚没有尝试安慰她。
- make no attempt to do：完全不尝试做某事（强调“零行动”）
- console：安慰（用于情绪痛苦）

---

## 2. completely absorbed in his tactical experiments
- 完全沉浸在他的战术实验中。
- absorbed in：全神贯注于……
- tactical experiments：战术实验（军事/科学用途）

---

## 3. with the abnegation of a scientist
- 带着科学家的自我牺牲精神。
- abnegation：克己、牺牲、自我否定
- of a scientist：作为科学家的身份特质

---

## 4. and even at the risk of his own life
- 甚至不惜冒生命危险。
- at the risk of：冒着……风险
- his own life：自己的生命

---

## 5. In an attempt to show the effects of the glass on enemy troops
- 为了展示这种玻璃对敌军的效果。
- in an attempt to：试图、为了
- effects on：对……的影响
- enemy troops：敌军

---

## 6. he exposed himself to the concentration of the sun&#039;s rays
- 他让自己暴露在集中聚焦的阳光下。
- exposed himself to：让自己暴露在……
- concentration of rays：光线的聚焦、集中
- sun’s rays：太阳光线

---

## 7. and suffered burns
- 结果被灼伤。
- suffered burns：受到烧伤

---

## 8. which turned into sores
- 伤口后来变成了溃疡。
- turned into：变成
- sores：溃疡、伤口（较严重的皮肤损伤）

---

## 9. that took a long time to heal
- 而且很久都没有痊愈。
- take a long time to heal：很久才愈合
- heal：愈合、恢复

---

- tactical experiments —— 战术实验

- at the risk of life —— 冒生命危险
- in an attempt to —— 试图 / 为了
- expose oneself to —— 使自己暴露于
- sun’s rays —— 太阳光线
- suffer burns —— 被灼伤
